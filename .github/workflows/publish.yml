# This workflow handles both release publishing and next tag publishing from main.
# When a release is published, it uses the release tag for versioning and publishes
# to the default npm tag. When code is pushed to main, it uses dunamai to generate
# a version from git history and publishes to the "next" npm tag.
# We need to handle both of these cases from a single workflow because we want to
# use NPM's OIDC Trusted Publisher support for publishing. That feature supports
# only a single workflow filename and, thus, a single workflow.
#
# The nightly schedule runs the same "next" publish path as a push. It exists
# because merges performed by the Dependabot auto-merge workflow use GITHUB_TOKEN,
# and GitHub deliberately does not trigger downstream workflows for GITHUB_TOKEN
# pushes. Without the schedule, Dependabot bumps would never produce a "next"
# build. The scheduled run skips publishing when the computed version is already
# on npm (i.e. no new commits landed since the last next build).

name: Test & Publish

on:
  release:
    types: [published]
  push:
    branches:
      - main
  schedule:
    # Daily at 06:00 UTC — catches commits merged by GITHUB_TOKEN (e.g. Dependabot
    # auto-merge) that did not trigger the push-based next publish.
    - cron: "0 6 * * *"

permissions:
  id-token: write
  contents: read

concurrency:
  group: test-build-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:

    # For push events, we need full git history (fetch-depth: 0) so dunamai can
    # generate a version from git tags. For release events, we only need the
    # current commit (fetch-depth: 1) since the version comes from the release tag.
    - uses: actions/checkout@v6.0.3
      with:
        persist-credentials: false
        fetch-depth: ${{ github.event_name == 'release' && 1 || 0 }}

    - name: Install Node.js 💻
      uses: actions/setup-node@v6
      with:
        node-version: 20
        registry-url: https://registry.npmjs.org/

    - name: Install locked dependencies 🔧
      run: npm ci

    - name: Test 🧪
      env:
        TZ: America/New_York
      run: npm test

    - name: Upgrade npm for OIDC support 📦
      # Upgrade npm to support OIDC trusted publishing. Earlier steps run with the
      # npm version bundled with current Node version to maintain consistency with
      # the development environment. Only the Publish step requires the newer version.
      # See https://docs.npmjs.com/trusted-publishers
      # > Note: Trusted publishing requires npm CLI version 11.5.1 or later.
      # TODO: This can be removed once we upgrade to Node 24 or greater.
      run: npm install -g npm@^11.5.1

    # For release events, version using the release tag and publish to default npm tag.
    - name: Version (Release) ✅
      if: github.event_name == 'release'
      run: npm version --no-git-tag-version ${{ github.event.release.tag_name }}

    - name: Publish (Release) 📚
      if: github.event_name == 'release'
      run: npm publish --access public

    # For push and scheduled events, version using dunamai and publish to the
    # "next" npm tag. dunamai requires Python.
    - name: Set up Python 🐍
      if: github.event_name == 'push' || github.event_name == 'schedule'
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - name: Set up Dunamai 🪄
      if: github.event_name == 'push' || github.event_name == 'schedule'
      run: pip install -r requirements-ci.txt

    - name: Version (Next) ✅
      if: github.event_name == 'push' || github.event_name == 'schedule'
      id: version-next
      run: |
        VERSION=$(dunamai from git --style semver)
        npm version --no-git-tag-version "$VERSION"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    # On the schedule, the most recent commit may already have a published next
    # build (no new commits since the last run). Detect that so we can skip the
    # publish instead of failing on a duplicate-version error.
    - name: Check existing next version 🔍
      if: github.event_name == 'schedule'
      id: existing-next
      run: |
        if npm view "@thepalaceproject/circulation-admin@${{ steps.version-next.outputs.version }}" version > /dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Publish (Next) 📚
      if: github.event_name == 'push' || (github.event_name == 'schedule' && steps.existing-next.outputs.exists == 'false')
      run: npm publish --tag next --access public
