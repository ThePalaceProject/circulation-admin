name: Test
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [24]

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7.0.0

      - name: Install Node.js ${{ matrix.node-version }} 💻
        uses: actions/setup-node@v7.0.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Pin npm version 📌
        run: npm install -g npm@11.17.0

      - name: Install locked dependencies 🔧
        run: npm ci

      - name: Lint (ESLint) 🧹
        run: npm run lint:js

      - name: Test 🧪
        env:
          TZ: America/New_York
        run: npm run coverage

      # An empty report would otherwise show up as a silently empty upload rather
      # than a build failure.
      - name: Check coverage report was written 🔍
        run: |
          if [ ! -s coverage/jest/lcov.info ]; then
            echo "::error::coverage/jest/lcov.info is missing or empty"
            exit 1
          fi

      # `disable_search` is required: without it, `files` is *added* to the
      # coverage files the CLI discovers on its own.
      - name: Upload jest coverage to Codecov 📊
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/jest/lcov.info
          disable_search: true
          flags: jest
          name: jest-node-${{ matrix.node-version }}
          verbose: true
