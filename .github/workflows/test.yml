name: Test
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [24]

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7.0.0

      - name: Install Node.js ${{ matrix.node-version }} 💻
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Pin npm version 📌
        run: npm install -g npm@11.17.0

      - name: Install locked dependencies 🔧
        run: npm ci

      - name: Lint (ESLint) 🧹
        run: npm run lint:js

      - name: Test 🧪
        env:
          TZ: America/New_York
        run: npm run coverage

      # nyc can fail to write a report while still exiting 0, which would
      # otherwise show up as a silently empty upload rather than a build failure.
      - name: Check coverage reports were written 🔍
        run: |
          for report in coverage/mocha/lcov.info coverage/jest/lcov.info; do
            if [ ! -s "$report" ]; then
              echo "::error::$report is missing or empty"
              exit 1
            fi
          done

      # `disable_search` is required: without it, `files` is *added* to the
      # coverage files the CLI discovers on its own, so each step would upload
      # both suites' reports and the flags would be meaningless.
      - name: Upload mocha coverage to Codecov 📊
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/mocha/lcov.info
          disable_search: true
          flags: mocha
          name: mocha-node-${{ matrix.node-version }}
          verbose: true

      - name: Upload jest coverage to Codecov 📊
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/jest/lcov.info
          disable_search: true
          flags: jest
          name: jest-node-${{ matrix.node-version }}
          verbose: true
