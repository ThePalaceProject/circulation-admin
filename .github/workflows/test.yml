name: Test
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7.0.0

      - name: Install Node.js 💻
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install locked dependencies 🔧
        run: npm ci

      - name: Lint (ESLint) 🧹
        run: npm run lint:js

      - name: Test 🧪
        env:
          TZ: America/New_York
        run: npm test
